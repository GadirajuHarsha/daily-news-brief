version: '3.8'

services:
  orator-bot:
    image: ghcr.io/gadirajuharsha/daily-news-brief:latest
    container_name: orator_bot
    restart: always
    env_file:
      - .env
    volumes:
      # Mount the data directory so user configs and database persist across updates
      - ./data:/app/data
      # Mount the local music folder
      - ./music:/app/music
      # Mount the default_sources file read-only
      - ./default_sources.json:/app/default_sources.json:ro

  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    # Check for new image every 5 minutes (300 seconds), only update orator_bot
    command: --interval 300 orator_bot
