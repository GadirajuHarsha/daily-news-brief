name: Daily News Brief
on:
  schedule:
    # 14:17 UTC is exactly 8:17 AM CST
    # Using '17' instead of '00' avoids the top-of-the-hour server congestion
    # - cron: '17 14 * * *'
    - cron: '57 0 * * *'
  workflow_dispatch:

jobs:
  run-brief:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Setup FFmpeg
        uses: FedericoCarboni/setup-ffmpeg@v3

      - name: Run Script
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_USER_ID: ${{ secrets.DISCORD_USER_ID }}
        run: python main.py

      - name: Commit seen stories
        run: |
          git config --global user.name 'News Bot'
          git config --global user.email 'bot@actions.com'
          git add seen_stories.txt
          git commit -m "Update seen stories [skip ci]" || echo "No changes to commit"
          git push || echo "Nothing to push"