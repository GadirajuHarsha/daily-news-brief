name: Daily News Brief
on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    # 14:17 UTC is exactly 8:17 AM CST (UTC-6)
    # Using '17' avoids the massive 14:00 UTC server rush
    # - cron: '17 14 * * *'
    - cron: '20 6 * * *'

jobs:
  run-brief:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Setup FFmpeg
        uses: FedericoCarboni/setup-ffmpeg@v3
      - name: Run Script
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_USER_ID: ${{ secrets.DISCORD_USER_ID }}
        run: python main.py
      - name: Commit seen stories
        run: |
          git config --global user.name 'News Bot'
          git config --global user.email 'bot@actions.com'
          git add seen_stories.txt
          git commit -m "Update seen stories [skip ci]" || echo "No changes to commit"
          git push || echo "Nothing to push"