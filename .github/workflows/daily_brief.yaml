name: Daily News Brief
on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    # 14:12 UTC is 8:12 AM CST. Dodges the '00' congestion.
    - cron: '12 14 * * *'

jobs:
  run-brief:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Setup FFmpeg
        uses: FedericoCarboni/setup-ffmpeg@v3
      - name: Run Script
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_USER_ID: ${{ secrets.DISCORD_USER_ID }}
        run: python main.py
      - name: Commit data persistence
        run: |
          git config --global user.name 'News Bot'
          git config --global user.email 'bot@actions.com'
          git add seen_stories.txt
          git add chroma_db/ || echo "no chroma_db found"
          git commit -m "Update memory persistence [skip ci]" || echo "No changes to commit"
          git push || echo "Nothing to push"