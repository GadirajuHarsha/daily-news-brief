name: Daily News Brief
on:
  schedule:
    - cron: '0 13 * * *'  # runs daily at 8am cst (13:00 utc)
  workflow_dispatch:      # allows manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run Script
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python main.py
      - name: Commit seen stories
        run: |
          git config --global user.name 'News Bot'
          git config --global user.email 'bot@actions.com'
          git add seen_stories.txt
          git commit -m "Update seen stories [skip ci]" || echo "No changes to commit"
          git push
